name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Check Rust formatting
        run: rustfmt --check --edition=2024 **/*.rs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy -- -D warnings
        env:
          # mimalloc-rust-sys fails on GCC 15 due to removed ATOMIC_VAR_INIT.
          # cc crate reads CFLAGS but nix wrapper may override; set both.
          CFLAGS: "-Wno-implicit-function-declaration -Wno-int-conversion -Wno-error"
          CXXFLAGS: "-Wno-implicit-function-declaration -Wno-int-conversion -Wno-error"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test
        env:
          CFLAGS: "-Wno-implicit-function-declaration -Wno-int-conversion -Wno-error"
          CXXFLAGS: "-Wno-implicit-function-declaration -Wno-int-conversion -Wno-error"
