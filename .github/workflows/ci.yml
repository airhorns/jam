name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Check Rust formatting
        run: rustfmt --check --edition=2024 **/*.rs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        # Set CC to the gcc-13 wrapper path from buildInputs to avoid mimalloc GCC 15 breakage.
        # The cc crate uses CC to find the C compiler.
        run: |
          GCC13=$(echo $buildInputs | tr ' ' '\n' | grep gcc | head -1)
          CC="$GCC13/bin/gcc" cargo clippy -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: |
          GCC13=$(echo $buildInputs | tr ' ' '\n' | grep gcc | head -1)
          CC="$GCC13/bin/gcc" cargo test
