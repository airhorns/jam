name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
      - name: Check Rust formatting
        run: nix develop -c rustfmt --check --edition=2024 src/*.rs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: nix develop -c cargo clippy -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: nix develop -c cargo test

  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: cd ts && npm install
      - name: Run typecheck
        run: cd ts && npx tsc --noEmit
