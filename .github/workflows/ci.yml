name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Check Rust formatting
        run: rustfmt --check --edition=2024 **/*.rs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        # CFLAGS: suppress mimalloc ATOMIC_VAR_INIT error on GCC 15
        run: CFLAGS="-Wno-error=implicit-function-declaration -Wno-error=int-conversion -Wno-error" cargo clippy -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: CFLAGS="-Wno-error=implicit-function-declaration -Wno-error=int-conversion -Wno-error" cargo test
