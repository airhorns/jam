name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r typecheck
      - run: pnpm test
      - run: cd examples/folk-todo && pnpm test
      - run: npx playwright install --with-deps chromium
      - run: cd examples/folk-todo && pnpm test:e2e
