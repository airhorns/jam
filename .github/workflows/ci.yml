name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm typecheck
      - run: corepack pnpm test:ui
      - run: corepack pnpm test
      - run: corepack pnpm --dir examples/folk-todo exec playwright install --with-deps chromium
      - run: corepack pnpm --dir examples/puddy-vite exec playwright install --with-deps chromium
      - run: corepack pnpm test:e2e
