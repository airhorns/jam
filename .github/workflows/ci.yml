name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Check Rust formatting
        run: rustfmt --check --edition=2024 **/*.rs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        # hardeningDisable: nix GCC wrapper adds -Werror which breaks mimalloc on GCC 15
        run: hardeningDisable=all cargo clippy -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: hardeningDisable=all cargo test
